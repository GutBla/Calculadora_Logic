<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Proposiciones Lógicas</title>
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">

  <link rel="icon" href="images/calculadora.png" type="image/png">
</head>
<body>
  <div class="container">
    <h1>Proposiciones Lógicas</h1>

    <!-- Contenedor para símbolos -->
    <h2>Simbolos</h2>
    <div id="simbolosContainer"></div>

    <h2>Letras Mayúsculas</h2>
    <div class="letras-container" id="letrasMayus"></div>
    <button id="verMasMayusBtn">Ver más letras mayúsculas</button>

    <h2>Letras Minúsculas</h2>
    <div class="letras-container" id="letrasMinus"></div>
    <button id="verMasMinusBtn">Ver más letras minúsculas</button>

    <h2>Valores Lógicos</h2>
    <div class="valores-container" id="valoresContainer">
      <button id="verdaderoBtn" class="verdadero">V</button>
      <button id="falsoBtn" class="falso">F</button>

    <!-- Área de texto para la fórmula -->
    <div class="formula-container">
      <textarea id="formula" placeholder="Escribe tu fórmula lógica..."></textarea>
      <div class="button-group">
        <button id="borrarBtn">Borrar</button>
        <button id="copiarBtn">Copiar</button>
      </div>
    </div>

    <button id="abrirPaginaBtn">Pagina : Truth Table Generator</button>
    <div id="tablaVerdadContainer"></div>
    </div>

  <script src="scripts/scripts.js"></script>
</body>
</html>
